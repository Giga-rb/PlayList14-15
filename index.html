<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ФУХХ Я УСТАЛ ЭТО ДЕЛАТЬ (ЕСЛИ ЗАМЕТИЛ ТЫ КТО ТАКОЙ ПРИЗНАЙСЯ)</title>
    <style>
        body { 
            font-family: sans-serif; 
            background: #0e0e15; 
            color: #fff; 
            display: flex; 
            justify-content: center; 
            margin: 0;
            padding: 15px; 
            min-height: 100vh;
        }
        .container { 
            width: 100%; 
            max-width: 600px; 
        }
        h2 { text-align: center; color: #ffcc00; margin-bottom: 20px; }
        
        .input-group { 
            display: flex; 
            flex-direction: row; 
            gap: 10px; 
            margin-bottom: 20px; 
        }

        @media (max-width: 480px) {
            .input-group { flex-direction: column; }
            button { padding: 15px; }
        }

        input { 
            flex-grow: 1; 
            padding: 12px; 
            border-radius: 10px; 
            border: none; 
            background: #1a1a27; 
            color: white; 
            font-size: 16px; 
        }
        button { 
            background: #ffcc00; 
            color: #000; 
            border: none; 
            padding: 10px 20px; 
            border-radius: 10px; 
            font-weight: bold; 
            cursor: pointer; 
        }
        .track-item { 
            background: #1a1a27; 
            padding: 10px; 
            border-radius: 12px; 
            margin-bottom: 10px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
        }
        .del-btn { background: #ff4757; color: white; border: none; padding: 8px 20px; border-radius: 5px; cursor: pointer; margin-top: 10px; width: 100%; max-width: 150px;}
        iframe { width: 100%; height: 80px; border-radius: 8px; border: none; }
        
        /* Стили для красивого блока ВК */
        .vk-player {
            width: 100%;
            height: 80px;
            background: #2787F5;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 15px;
            box-sizing: border-box;
        }
        .vk-player span { font-weight: bold; font-size: 15px; }
        .vk-player a {
            background: white;
            color: #2787F5;
            padding: 8px 16px;
            border-radius: 20px;
            text-decoration: none;
            font-weight: bold;
            font-size: 14px;
        }
    </style>
</head>
<body>

<div class="container">
    <h2> ВУАААА ЭТО ЖЕ ПЛЕЙЛИСТ</h2>
    <div class="input-group">
        <input type="text" id="urlInput" placeholder="Ссылка на Яндекс Музыку или ВК ну лучше яндекс бро:)">
        <button onclick="addTrack()">ТУДА ЕГО</button>
    </div>
    <div id="playlist"></div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getDatabase, ref, push, onValue, remove, get } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDqXhc_dYigW3YN0SpYHCBELW_aj-_yvkE",
        authDomain: "playlist14-15.firebaseapp.com",
        databaseURL: "https://playlist14-15-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "playlist14-15",
        storageBucket: "playlist14-15.appspot.com",
        messagingSenderId: "252339325951",
        appId: "1:252339325951:web:afb9bd0afbd5dda43175ca"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const tracksRef = ref(db, 'tracks');
    const ADMIN_PASS = "Giga"; 
    const renderedTracks = {}; 

    window.addTrack = async function() {
        const inputUrl = document.getElementById('urlInput').value.trim();
        if (!inputUrl) return;

        let trackData = null;

        // Ищем Яндекс или ВК
        const yaMatch = inputUrl.match(/album\/(\d+)\/track\/(\d+)/);
        // Вытаскиваем уникальный ID трека из ссылки ВК (например, audio-2001400501_119400501)
        const vkMatch = inputUrl.match(/vk\.com\/audio(-?\d+_\d+)/);

        if (yaMatch) {
            trackData = {
                type: 'yandex',
                albumId: yaMatch[1],
                trackId: yaMatch[2]
            };
        } else if (vkMatch) {
            trackData = {
                type: 'vk',
                url: inputUrl,
                vkId: vkMatch[1] // Уникальный ID для защиты от дубликатов
            };
        } else {
            alert('Неверный формат! Скинь ссылку на трек из Яндекс.Музыки или прямую ссылку из ВКонтакте.');
            return;
        }

        const snapshot = await get(tracksRef);
        const data = snapshot.val();
        let exists = false;
        
        // Сверяем на дубликаты
        if (data) {
            Object.values(data).forEach(track => {
                if (trackData.type === 'yandex' && track.type === 'yandex' && track.trackId === trackData.trackId) {
                    exists = true;
                }
                if (trackData.type === 'vk' && track.type === 'vk' && track.vkId === trackData.vkId) {
                    exists = true;
                }
            });
        }

        if (exists) {
            alert('ТРЕК УЖЕ ДОБАВЛЕН ЛОШАРА! С УВАЖЕНИЕМ ГОВОРИТ ЭТО GIGA ЛИБО ПРОСТО GIGABYTE ETHERNET :)');
        } else {
            push(tracksRef, trackData);
            document.getElementById('urlInput').value = '';
        }
    };

    window.removeTrack = function(key) {
        const pass = prompt("Введите пароль если ты админ:) :");
        if (pass === ADMIN_PASS) {
            remove(ref(db, 'tracks/' + key));
        } else {
            alert("Неверный пароль даун!");
        }
    };

    onValue(tracksRef, (snapshot) => {
        const data = snapshot.val() || {};
        const playlist = document.getElementById('playlist');

        Object.keys(renderedTracks).forEach(key => {
            if (!data[key]) {
                renderedTracks[key].remove();
                delete renderedTracks[key];
            }
        });

        Object.entries(data).forEach(([key, track]) => {
            if (!renderedTracks[key]) {
                const div = document.createElement('div');
                div.className = 'track-item';
                
                let playerHtml = '';
                
                if (track.type === 'vk') {
                    // Выводим нашу красивую заглушку для ВК
                    playerHtml = `
                        <div class="vk-player">
                            <span>Трек из ВКонтакте</span>
                            <a href="${track.url}" target="_blank">Слушать</a>
                        </div>
                    `;
                } else {
                    // Яндекс выводится как и раньше
                    playerHtml = `<iframe src="https://music.yandex.ru/iframe/#track/${track.trackId}/${track.albumId}" frameborder="0"></iframe>`;
                }

                div.innerHTML = `
                    ${playerHtml}
                    <button class="del-btn" onclick="removeTrack('${key}')">Удалить</button>
                `;
                playlist.appendChild(div);
                renderedTracks[key] = div;
            }
        });
    });
</script>
</body>
</html>
