<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Общий Свадебный Плейлист</title>
    <style>
        body { font-family: sans-serif; background: #0e0e15; color: #fff; display: flex; justify-content: center; padding: 20px; }
        .container { width: 100%; max-width: 600px; }
        h2 { text-align: center; color: #ffcc00; margin-bottom: 20px; }
        .input-group { display: flex; gap: 10px; margin-bottom: 20px; }
        input { flex-grow: 1; padding: 12px; border-radius: 10px; border: none; background: #1a1a27; color: white; }
        button { background: #ffcc00; color: #000; border: none; padding: 10px 20px; border-radius: 10px; font-weight: bold; cursor: pointer; }
        .track-item { background: #1a1a27; padding: 10px; border-radius: 12px; margin-bottom: 10px; display: flex; flex-direction: column; align-items: center; }
        .del-btn { background: #ff4757; color: white; border: none; padding: 5px 15px; border-radius: 5px; cursor: pointer; margin-top: 5px; }
        iframe { width: 100%; height: 80px; border-radius: 8px; }
    </style>
</head>
<body>

<div class="container">
    <h2>🎵 Общий Плейлист</h2>
    <div class="input-group">
        <input type="text" id="urlInput" placeholder="Ссылка на трек...">
        <button onclick="addTrack()">Добавить</button>
    </div>
    <div id="playlist"></div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getDatabase, ref, push, onValue, remove } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDqXhc_dYigW3YN0SpYHCBELW_aj-_yvkE",
        authDomain: "playlist14-15.firebaseapp.com",
        databaseURL: "https://playlist14-15-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "playlist14-15",
        storageBucket: "playlist14-15.appspot.com",
        messagingSenderId: "252339325951",
        appId: "1:252339325951:web:afb9bd0afbd5dda43175ca"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const tracksRef = ref(db, 'tracks');

    // Твой секретный пароль (замени на свой)
    const ADMIN_PASS = "12345"; 

    window.addTrack = function() {
        const input = document.getElementById('urlInput');
        const match = input.value.match(/album\/(\d+)\/track\/(\d+)/);
        
        if (!match) {
            alert('Неверная ссылка');
            return;
        }

        const newTrackId = match[2];

        // Проверка на дубликат
        onValue(tracksRef, (snapshot) => {
            const data = snapshot.val();
            let exists = false;
            
            if (data) {
                Object.values(data).forEach(track => {
                    if (track.trackId === newTrackId) exists = true;
                });
            }

            if (exists) {
                alert('ТРЕК УЖЕ ДОБАВЛЕН ДРУГИМ ЧЕЛОВЕКОМ А ТЫ ЛОШАРА НЕ УСПЕЛ');
            } else {
                push(tracksRef, { albumId: match[1], trackId: match[2] });
                input.value = '';
            }
        }, { onlyOnce: true });
    };

    window.removeTrack = function(key) {
        const pass = prompt("Введите пароль администратора:");
        if (pass === ADMIN_PASS) {
            remove(ref(db, 'tracks/' + key));
        } else {
            alert("Неверный пароль!");
        }
    };

    onValue(tracksRef, (snapshot) => {
        const data = snapshot.val();
        const list = document.getElementById('playlist');
        list.innerHTML = '';
        if (data) {
            Object.entries(data).forEach(([key, track]) => {
                list.innerHTML += `
                    <div class="track-item">
                        <iframe src="https://music.yandex.ru/iframe/#track/${track.trackId}/${track.albumId}" frameborder="0"></iframe>
                        <button class="del-btn" onclick="removeTrack('${key}')">Удалить</button>
                    </div>
                `;
            });
        }
    });
</script>
</body>
</html>
