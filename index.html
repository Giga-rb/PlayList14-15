<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Общий Свадебный Плейлист</title>
    <style>
        body { font-family: sans-serif; background: #0e0e15; color: #fff; display: flex; justify-content: center; margin: 0; padding: 15px; min-height: 100vh; }
        .container { width: 100%; max-width: 600px; }
        h2 { text-align: center; color: #ffcc00; margin-bottom: 20px; }
        .input-group { display: flex; gap: 10px; margin-bottom: 20px; }
        input { flex-grow: 1; padding: 12px; border-radius: 10px; border: none; background: #1a1a27; color: white; font-size: 16px; }
        button { background: #ffcc00; color: #000; border: none; padding: 10px 20px; border-radius: 10px; font-weight: bold; cursor: pointer; }
        .track-item { background: #1a1a27; padding: 10px; border-radius: 12px; margin-bottom: 10px; display: flex; flex-direction: column; align-items: center; }
        .del-btn { background: #ff4757; color: white; border: none; padding: 8px 20px; border-radius: 5px; cursor: pointer; margin-top: 10px; }
        iframe { width: 100%; height: 80px; border-radius: 8px; }

        /* Стили для кастомного модального окна */
        #customModal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); justify-content:center; align-items:center; z-index:1000; }
        .modal-content { background:#1a1a27; padding:25px; border-radius:15px; text-align:center; max-width:80%; border: 1px solid #333; }
        #modalInput { width: 90%; padding: 10px; margin-bottom: 15px; border-radius: 5px; border: none; background: #0e0e15; color: white; }
    </style>
</head>
<body>

<div class="container">
    <h2>🎵 Общий Плейлист</h2>
    <div class="input-group">
        <input type="text" id="urlInput" placeholder="Ссылка на трек...">
        <button onclick="addTrack()">Добавить</button>
    </div>
    <div id="playlist"></div>
</div>

<!-- Модальное окно -->
<div id="customModal">
    <div class="modal-content">
        <p id="modalText"></p>
        <input type="password" id="modalInput" style="display:none;">
        <br>
        <button id="modalBtn">ОК</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getDatabase, ref, push, onValue, remove } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDqXhc_dYigW3YN0SpYHCBELW_aj-_yvkE",
        authDomain: "playlist14-15.firebaseapp.com",
        databaseURL: "https://playlist14-15-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "playlist14-15",
        storageBucket: "playlist14-15.appspot.com",
        messagingSenderId: "252339325951",
        appId: "1:252339325951:web:afb9bd0afbd5dda43175ca"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const tracksRef = ref(db, 'tracks');
    const ADMIN_PASS = "Giga"; 

    // Функция показа модального окна
    window.showModal = function(text, isPrompt = false, callback = null) {
        const modal = document.getElementById('customModal');
        const modalText = document.getElementById('modalText');
        const modalInput = document.getElementById('modalInput');
        const modalBtn = document.getElementById('modalBtn');

        modalText.innerText = text;
        modal.style.display = 'flex';
        modalInput.style.display = isPrompt ? 'block' : 'none';
        
        modalBtn.onclick = () => {
            if (isPrompt) callback(modalInput.value);
            modal.style.display = 'none';
            modalInput.value = '';
        };
    };

    window.addTrack = function() {
        const input = document.getElementById('urlInput');
        const match = input.value.match(/album\/(\d+)\/track\/(\d+)/);
        
        if (!match) {
            showModal('Неверная ссылка');
            return;
        }

        const newTrackId = match[2];

        onValue(tracksRef, (snapshot) => {
            const data = snapshot.val();
            let exists = false;
            if (data) {
                Object.values(data).forEach(track => {
                    if (track.trackId === newTrackId) exists = true;
                });
            }

            if (exists) {
                showModal('ТРЕК УЖЕ ДОБАВЛЕН ДРУГИМ ГОСТЕМ! ИДИ ПОПЛАЧЬ ИЗА ЭТОГО :) P.s простите меня это создатель сайта вам сказал с шуткой а кто его создал большой большой секрет с уважением ваш Паша:)');
            } else {
                push(tracksRef, { albumId: match[1], trackId: match[2] });
                input.value = '';
            }
        }, { onlyOnce: true });
    };

    window.removeTrack = function(key) {
        showModal("Введите пароль администратора:", true, (pass) => {
            if (pass === ADMIN_PASS) {
                remove(ref(db, 'tracks/' + key));
            } else {
                showModal("Неверный пароль!");
            }
        });
    };

    onValue(tracksRef, (snapshot) => {
        const data = snapshot.val();
        const list = document.getElementById('playlist');
        list.innerHTML = '';
        if (data) {
            Object.entries(data).forEach(([key, track]) => {
                list.innerHTML += `
                    <div class="track-item">
                        <iframe src="https://music.yandex.ru/iframe/#track/${track.trackId}/${track.albumId}" frameborder="0"></iframe>
                        <button class="del-btn" onclick="removeTrack('${key}')">Удалить</button>
                    </div>
                `;
            });
        }
    });
</script>
</body>
</html>
